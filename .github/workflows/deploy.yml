name: Deploy

on:
  push:
    branches: ["main"]
  # Allow a manual trigger from the GitHub Actions UI
  workflow_dispatch:

permissions:
  contents: read

# Prevent multiple concurrent deployments
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    permissions:
      contents: read
    environment: production   # optional: add approval gate in GitHub → Settings → Environments

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── Option A: push image to GitHub Container Registry ──────────────────
      # Uncomment this block and the "deploy via SSH" step below if you want
      # the server to pull a pre-built image rather than build on the server.
      #
      # - name: Log in to GHCR
      #   uses: docker/login-action@v3
      #   with:
      #     registry: ghcr.io
      #     username: ${{ github.actor }}
      #     password: ${{ secrets.GITHUB_TOKEN }}
      #
      # - name: Build and push to GHCR
      #   uses: docker/build-push-action@v6
      #   with:
      #     context: .
      #     push: true
      #     tags: ghcr.io/${{ github.repository }}:latest
      #     cache-from: type=gha
      #     cache-to: type=gha,mode=max
      # ── Option B (default): SSH to server, pull repo, rebuild in place ──────

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          script: |
            set -e
            cd ${{ secrets.DEPLOY_PATH || '~/content-creation-tool' }}

            # Pull latest code
            git pull origin main

            # Rebuild and restart (zero-downtime swap)
            docker compose -f docker-compose.yml -f docker-compose.prod.yml \
              up --build -d --remove-orphans

            # Clean up dangling images to save disk space
            docker image prune -f

      - name: Verify deployment
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          script: |
            # Give the container a few seconds to become healthy
            sleep 5
            docker compose -f ${{ secrets.DEPLOY_PATH || '~/content-creation-tool' }}/docker-compose.yml \
              -f ${{ secrets.DEPLOY_PATH || '~/content-creation-tool' }}/docker-compose.prod.yml \
              ps
