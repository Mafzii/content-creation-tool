<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Content Creation Tool</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <div class="logo">Content<span>.</span>Tool</div>
  <nav id="nav">
    <button class="active" data-tab="topics">Topics</button>
    <button data-tab="sources">Sources</button>
    <button data-tab="styles">Styles</button>
    <button data-tab="drafts">Drafts</button>
    <button data-tab="settings">Settings</button>
  </nav>
</header>

<main>

  <!-- TOPICS -->
  <div class="tab-panel active" id="tab-topics">
    <div>
      <h1 class="panel-title">Topics</h1>
      <div id="notice-topics" class="notice"></div>
      <div class="list-wrap" id="list-topics"><div class="list-empty">No topics yet.</div></div>
    </div>
    <div class="form-card">
      <div class="form-title">Add Topic</div>
      <form id="form-topics">
        <div class="field"><label>Name</label><input type="text" name="name" required placeholder="e.g. AI trends"></div>
        <div class="field"><label>Description</label><textarea name="description" placeholder="Scope paragraph for LLM context…" style="min-height:70px"></textarea></div>
        <div class="field"><label>Keywords</label><input type="text" name="keywords" placeholder="comma-separated, e.g. AI, trends, 2026"></div>
        <button type="submit" class="submit-btn">Create Topic</button>
      </form>
    </div>
  </div>

  <!-- SOURCES -->
  <div class="tab-panel" id="tab-sources">
    <div>
      <h1 class="panel-title">Sources</h1>
      <div id="notice-sources" class="notice"></div>
      <div class="list-wrap" id="list-sources"><div class="list-empty">No sources yet.</div></div>
    </div>
    <div class="form-card">
      <div class="form-title">Add Source</div>
      <form id="form-sources" enctype="multipart/form-data">
        <div class="field"><label>Name</label><input type="text" name="name" required placeholder="e.g. Research paper"></div>
        <div class="field">
          <label>Type</label>
          <select name="type" id="source-type-select">
            <option value="text">Text</option>
            <option value="url">URL</option>
            <option value="file">File</option>
          </select>
        </div>
        <div class="field" id="source-raw-field">
          <label id="source-raw-label">Content</label>
          <textarea name="raw" id="source-raw-input" placeholder="Paste your source text here…" style="min-height:100px"></textarea>
        </div>
        <div class="field" id="source-file-field" style="display:none">
          <label>File</label>
          <input type="file" name="file" id="source-file-input" accept=".txt,.md">
        </div>
        <div class="field" id="source-content-field">
          <label>Cleaned text <span style="font-size:0.68rem;color:var(--muted)">(optional override)</span></label>
          <textarea name="content" placeholder="Leave blank to use text above…" style="min-height:60px"></textarea>
        </div>
        <div id="source-fetch-status" style="display:none; margin-bottom:1rem; font-size:0.82rem; color:var(--muted)"></div>
        <button type="submit" class="submit-btn" id="source-submit-btn">Create Source</button>
      </form>
    </div>
  </div>

  <!-- STYLES -->
  <div class="tab-panel" id="tab-styles">
    <div>
      <h1 class="panel-title">Styles</h1>
      <div id="notice-styles" class="notice"></div>
      <div class="list-wrap" id="list-styles"><div class="list-empty">No styles yet.</div></div>
    </div>
    <div class="form-card">
      <div class="form-title">Add Style</div>
      <form id="form-styles">
        <div class="field"><label>Name</label><input type="text" name="name" required placeholder="e.g. Casual Blog"></div>
        <div class="field"><label>Tone</label><input type="text" name="tone" placeholder="formal, casual, humorous…"></div>
        <div class="field"><label>Prompt</label><textarea name="prompt" required placeholder="Write in a casual, conversational tone..."></textarea></div>
        <div class="field"><label>Example <span style="font-size:0.68rem;color:var(--muted)">(optional)</span></label><textarea name="example" placeholder="Sample writing in this style…" style="min-height:70px"></textarea></div>
        <button type="submit" class="submit-btn">Create Style</button>
      </form>
    </div>
  </div>

  <!-- DRAFTS -->
  <div class="tab-panel" id="tab-drafts">
    <div>
      <h1 class="panel-title">Drafts</h1>
      <div id="notice-drafts" class="notice"></div>
      <div class="list-wrap" id="list-drafts"><div class="list-empty">No drafts yet.</div></div>
    </div>
    <div class="form-card">
      <div class="form-title">New Draft</div>
      <form id="form-drafts">
        <div class="field"><label>Title</label><input type="text" name="title" required placeholder="Draft title"></div>
        <div class="field"><label>Topic</label><select name="topic_id" required><option value="">— select topic —</option></select></div>
        <div class="field"><label>Style</label><select name="style_id" required><option value="">— select style —</option></select></div>
        <div class="field">
          <label>Sources</label>
          <div class="checkbox-list" id="draft-source-list"><div style="padding:0.6rem 0.75rem;font-size:0.78rem;color:var(--muted)">No sources available.</div></div>
        </div>
        <div class="field"><label>Notes</label><textarea name="notes" placeholder="Additional LLM instructions, e.g. under 500 words…" style="min-height:60px"></textarea></div>
        <div class="field"><label>Content</label><textarea name="content" id="draft-content" placeholder="Write your draft or generate below…" style="min-height:120px"></textarea></div>

        <!-- Generate panel -->
        <div class="generate-panel">
          <button type="button" class="generate-btn" id="btn-generate">Generate 3 Drafts</button>
        </div>

        <div class="field" style="margin-top:1.25rem">
          <label>Status</label>
          <select name="status">
            <option value="draft">draft</option>
            <option value="published">published</option>
          </select>
        </div>
        <button type="submit" class="submit-btn">Save Draft</button>
      </form>
    </div>
  </div>

  <!-- SETTINGS -->
  <div class="tab-panel active" id="tab-settings" style="display:none">
    <div class="settings-layout">
      <h1 class="panel-title">Settings</h1>
      <div id="notice-settings" class="notice"></div>
      <div class="form-card" style="position:static">
        <div class="form-title">LLM Configuration</div>
        <div class="field">
          <label>Provider</label>
          <select id="setting-provider">
            <option value="gemini">Gemini</option>
            <option value="claude">Claude (Anthropic)</option>
            <option value="openai">OpenAI</option>
          </select>
        </div>
        <div class="field"><label>Model</label><input type="text" id="setting-model" placeholder="e.g. gemini-1.5-pro"></div>
        <div class="field"><label>API Key</label><input type="password" id="setting-apikey" placeholder="Your API key"></div>
        <button type="button" class="submit-btn" id="btn-save-settings">Save Settings</button>
      </div>
    </div>
  </div>

</main>

<!-- GENERATE MODAL -->
<div class="modal-overlay" id="modal-generate">
  <div class="modal-box">
    <div class="modal-header">
      <span class="modal-title">Generated Variants</span>
      <button class="modal-close" id="modal-generate-close" type="button">&#x2715;</button>
    </div>
    <div class="modal-body">
      <div id="modal-variant-cards"></div>
      <div class="tweak-section visible" style="margin-top:1rem">
        <div class="field"><label>Tweak instruction</label><textarea id="modal-tweak-instruction" placeholder="e.g. make it more concise, add a CTA…" style="min-height:60px"></textarea></div>
        <button type="button" class="generate-btn" id="modal-btn-tweak">Apply Tweak</button>
      </div>
    </div>
    <div class="modal-footer">
      <button type="button" class="submit-btn" id="modal-btn-use-variant">Use Selected Variant</button>
      <button type="button" class="cancel-btn" id="modal-generate-cancel">Cancel</button>
    </div>
  </div>
</div>

<!-- EDIT MODAL -->
<div class="modal-overlay" id="modal-edit">
  <div class="modal-box">
    <div class="modal-header">
      <span class="modal-title" id="modal-edit-title">Edit</span>
      <button class="modal-close" id="modal-edit-close" type="button">&#x2715;</button>
    </div>
    <div class="modal-body">
      <div id="notice-edit" class="notice"></div>
      <div id="modal-edit-fields"></div>
    </div>
    <div class="modal-footer">
      <button type="button" class="submit-btn" id="modal-edit-save">Save</button>
      <button type="button" class="cancel-btn" id="modal-edit-cancel">Cancel</button>
    </div>
  </div>
</div>

<script type="module" src="js/app.js"></script>
</body>
</html>
